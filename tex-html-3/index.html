<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeXエディター</title>
  <meta name="description" content="CodeMirror 6 ベースのリッチな LaTeX エディター with KaTeX プレビュー">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

  <!-- App CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- CodeMirror 6 Import Map -->
  <script type="importmap">
  {
    "imports": {
      "@codemirror/state":          "https://esm.sh/@codemirror/state@6",
      "@codemirror/view":           "https://esm.sh/@codemirror/view@6",
      "@codemirror/commands":       "https://esm.sh/@codemirror/commands@6",
      "@codemirror/search":         "https://esm.sh/@codemirror/search@6",
      "@codemirror/language":       "https://esm.sh/@codemirror/language@6",
      "@codemirror/autocomplete":   "https://esm.sh/@codemirror/autocomplete@6",
      "@codemirror/lang-markdown":  "https://esm.sh/@codemirror/lang-markdown@6",
      "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6"
    }
  }
  </script>
</head>
<body>
<div id="app">

  <!-- ===== ツールバー ===== -->
  <header id="toolbar" role="toolbar" aria-label="エディタツールバー">
    <div id="toolbar-buttons">
      <button class="tb-btn" data-action="textbf"      title="\textbf{...} 太字"><b>B</b></button>
      <button class="tb-btn" data-action="textit"      title="\textit{...} 斜体"><i>I</i></button>
      <div class="tb-sep" role="separator"></div>
      <button class="tb-btn" data-action="section"     title="\section{...}">§</button>
      <button class="tb-btn" data-action="subsection"  title="\subsection{...}">§§</button>
      <div class="tb-sep" role="separator"></div>
      <button class="tb-btn tb-math" data-action="inline-math"  title="インライン数式 $...$">$</button>
      <button class="tb-btn tb-math" data-action="display-math" title="ディスプレイ数式 \[...\]">$$</button>
      <button class="tb-btn"         data-action="align"         title="align* 環境">align</button>
      <div class="tb-sep" role="separator"></div>
      <button class="tb-btn" data-action="itemize"   title="itemize 環境（箇条書き）">• list</button>
      <button class="tb-btn" data-action="enumerate" title="enumerate 環境（番号付き）">1. list</button>
      <div class="tb-sep" role="separator"></div>
      <button class="tb-btn tb-export" id="btn-export" title=".txt ファイルとしてエクスポート">⬇ Export</button>
    </div>
    <div id="toolbar-right">
      <span id="char-count" aria-live="polite" aria-label="文字数">0文字</span>
    </div>
  </header>

  <!-- ===== タブバー ===== -->
  <div id="tab-bar" role="tablist" aria-label="タブ">
    <div id="tab-list"></div>
    <button id="btn-add-tab" title="新しいタブを追加" aria-label="タブを追加">＋</button>
  </div>

  <!-- ===== メインエリア（エディター + プレビュー）===== -->
  <main id="main-area">
    <div id="editor-pane" aria-label="LaTeX エディター">
      <div id="cm-editor"></div>
    </div>
    <div id="divider" role="separator" aria-orientation="vertical" aria-label="ペインサイズ変更"></div>
    <div id="preview-pane" aria-label="プレビュー">
      <div id="preview"></div>
    </div>
  </main>

</div>

<!-- トースト通知 -->
<div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<!-- KaTeX ランタイム -->
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

<!-- アプリ本体（ESM モジュール） -->
<script type="module" src="js/main.js"></script>
</body>
</html>
